name: Build Aurum

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
        include:
          - os: windows-latest
            output_name: Aurum_Windows
            pyinstaller_args: --onedir --noconsole --icon=Aurum.ico
          - os: macos-latest
            output_name: Aurum_macOS
            pyinstaller_args: --onedir --noconsole --icon=Aurum.icns  # 若没有 .icns 可去掉 --icon

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies (通用)
        run: |
          python -m pip install --upgrade pip
          pip install streamlit pyinstaller pypinyin python-docx openai pyyaml bcrypt pandas requests packaging psutil

      - name: Install Windows-specific dependencies
        if: matrix.os == 'windows-latest'
        run: |
          pip install pywin32

      - name: Build with PyInstaller
        run: |
          pyinstaller ${{ matrix.pyinstaller_args }} --name Aurum --add-data "aurum_core;aurum_core" --add-data "README.txt;." --add-data "aurum_app.py;." --hidden-import streamlit --hidden-import streamlit.web --hidden-import streamlit.web.cli --hidden-import pypinyin --hidden-import docx --hidden-import openai --hidden-import yaml --hidden-import bcrypt --hidden-import pandas --hidden-import requests --hidden-import packaging --collect-all streamlit --collect-all certifi run.py

      - name: Upload Windows artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output_name }}
          path: dist/Aurum/

      - name: Upload macOS artifact
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output_name }}
          path: dist/Aurum/
